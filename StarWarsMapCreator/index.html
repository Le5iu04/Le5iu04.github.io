        <script>
          var draggables = document.getElementsByClassName("icon");
          var activeDraggable = null;
          var pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;

          for (var i = 0; i < draggables.length; i++) {
            draggables[i].addEventListener("mousedown", function(event) {
              activeDraggable = this;
              event = event || window.event;
              event.preventDefault();

              pos3 = event.clientX;
              pos4 = event.clientY;
              document.addEventListener("mouseup", closeDragElement);
              document.addEventListener("mousemove", elementDrag);
            });
          }

          function elementDrag(event) {
            event = event || window.event;
            event.preventDefault();

            pos1 = pos3 - event.clientX;
            pos2 = pos4 - event.clientY;
            pos3 = event.clientX;
            pos4 = event.clientY;

            activeDraggable.style.top = (activeDraggable.offsetTop - pos2) + "px";
            activeDraggable.style.left = (activeDraggable.offsetLeft - pos1) + "px";
          }

          function closeDragElement() {
            document.removeEventListener("mouseup", closeDragElement);
            document.removeEventListener("mousemove", elementDrag);
            activeDraggable = null;
          }
        </script>

    <div id="settings">
      <p>Wybierz plik tła: </p>
      <input type="file" id="fileName"><br>
      <p>Wybierz wielkość: </p>
      <p>X:<input type="number" id="width"></p>
      <p>Y:<input type="number" id="height"></p>
      <button type="button" onclick="draw();">Rysuj</button><br><br>

      <script type="text/javascript">
        // Helper function to convert numeric column index to Excel-like alphabetical strings (A, B, C... Z, AA, AB...)
        function getColLabel(index) {
          let label = "";
          while (index >= 0) {
            label = String.fromCharCode((index % 26) + 65) + label;
            index = Math.floor(index / 26) - 1;
          }
          return label;
        }

        function draw() {
          var rows = parseInt(document.getElementById("width").value);
          var columns = parseInt(document.getElementById("height").value);
          var table = document.getElementById("tabl");

          // Wyczyszczenie tabeli, jeśli już istnieje
          while (table.firstChild) {
            table.removeChild(table.firstChild);
          }

          if (isNaN(rows) || isNaN(columns) || rows <= 0 || columns <= 0) return;

          // 1. Create the Top Header Row (Letters)
          var headerRow = document.createElement("tr");

          // Blank corner cell (top-left)
          var cornerCell = document.createElement("td");
          cornerCell.className = "corner-cell";
          headerRow.appendChild(cornerCell);

          // Alphabet labels for each column
          for (var j = 0; j < columns; j++) {
            var cell = document.createElement("td");
            cell.className = "coordinate-label";
            cell.innerText = getColLabel(j);
            headerRow.appendChild(cell);
          }
          table.appendChild(headerRow);

          // 2. Generowanie wierszy z mapą i numerami bocznymi
          for (var i = 0; i < rows; i++) {
            var row = document.createElement("tr");

            // Left Sidebar cell (Numbers)
            var numberCell = document.createElement("td");
            numberCell.className = "coordinate-label";
            numberCell.innerText = (i + 1);
            row.appendChild(numberCell);

            // Playable grid cells
            for (var j = 0; j < columns; j++) {
              var cell = document.createElement("td");
              row.appendChild(cell);
            }

            table.appendChild(row);
          }
        }
      </script>
